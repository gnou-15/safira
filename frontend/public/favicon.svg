    {/* Goggles Left */}
    <circle cx="37" cy="58" r="12" fill="#e5832a" stroke="#3b1c14" strokeWidth="2.5" />
    <circle cx="37" cy="58" r="9.5" fill="#f9ab55" stroke="#3b1c14" strokeWidth="1.8" />
    <circle cx="37" cy="58" r="8" fill="#3a9ad9" stroke="#3b1c14" strokeWidth="1.8" />
    <path d="M 34,55 L 36,53" stroke="#ffffff" strokeWidth="2" strokeLinecap="round" />

    {/* Goggles Right */}
    <circle cx="63" cy="58" r="12" fill="#e5832a" stroke="#3b1c14" strokeWidth="2.5" />
    <circle cx="63" cy="58" r="9.5" fill="#f9ab55" stroke="#3b1c14" strokeWidth="1.8" />
    <circle cx="63" cy="58" r="8" fill="#3a9ad9" stroke="#3b1c14" strokeWidth="1.8" />
    <path d="M 60,55 L 62,53" stroke="#ffffff" strokeWidth="2" strokeLinecap="round" />
